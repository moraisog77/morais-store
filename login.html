<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - FF Sens Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <!-- TELA DE LOGIN -->
  <div class="login-overlay" id="loginScreen">
    <div class="login-box">

      <!-- Logo -->
      <div class="login-logo">
        <span class="logo-icon">🔥</span>
        <span class="logo-text">FF <span class="highlight">SENS</span> PRO</span>
      </div>

      <h2 class="login-title">Entrar na sua conta</h2>
      <p class="login-sub">Acesse para ver seus planos e configurações</p>

      <!-- Botão Google -->
      <button class="btn-social btn-google" id="btnGoogle">
        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar com Google
      </button>

      <!-- Botão Facebook -->
      <button class="btn-social btn-facebook" id="btnFacebook">
        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
        </svg>
        Continuar com Facebook
      </button>

      <!-- Divisor -->
      <div class="login-divider">
        <span>ou</span>
      </div>

      <!-- Email/Senha -->
      <form class="login-form" id="loginForm">
        <div class="input-group">
          <label>E-mail</label>
          <input type="email" id="emailInput" placeholder="seu@email.com" required />
        </div>
        <div class="input-group">
          <label>Senha</label>
          <div class="input-password">
            <input type="password" id="passwordInput" placeholder="••••••••" required />
            <button type="button" class="toggle-pass" onclick="togglePassword()">👁</button>
          </div>
        </div>
        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" /> Lembrar de mim
          </label>
          <a href="#" class="forgot-pass">Esqueci a senha</a>
        </div>
        <button type="submit" class="btn-login">Entrar</button>
      </form>

      <!-- Cadastro -->
      <p class="login-register">
        Não tem conta? <a href="#" id="showRegister">Criar conta grátis</a>
      </p>

      <!-- Mensagem de erro -->
      <div class="login-error" id="loginError"></div>

    </div>
  </div>

  <!-- MODAL CADASTRO -->
  <div class="modal-overlay" id="registerModal">
    <div class="login-box">
      <button class="modal-close" onclick="closeRegister()">✕</button>
      <div class="login-logo">
        <span class="logo-icon">🔥</span>
        <span class="logo-text">FF <span class="highlight">SENS</span> PRO</span>
      </div>
      <h2 class="login-title">Criar conta</h2>
      <p class="login-sub">É grátis e rápido</p>

      <button class="btn-social btn-google" id="btnGoogleRegister">
        <svg class="social-icon" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Cadastrar com Google
      </button>

      <button class="btn-social btn-facebook" id="btnFacebookRegister">
        <svg class="social-icon" viewBox="0 0 24 24">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
        </svg>
        Cadastrar com Facebook
      </button>

      <div class="login-divider"><span>ou</span></div>

      <form class="login-form" id="registerForm">
        <div class="input-group">
          <label>Nome</label>
          <input type="text" id="nameInput" placeholder="Seu nome" required />
        </div>
        <div class="input-group">
          <label>E-mail</label>
          <input type="email" id="regEmailInput" placeholder="seu@email.com" required />
        </div>
        <div class="input-group">
          <label>Senha</label>
          <input type="password" id="regPasswordInput" placeholder="Mínimo 6 caracteres" required minlength="6" />
        </div>
        <button type="submit" class="btn-login">Criar conta</button>
      </form>

      <p class="login-register">
        Já tem conta? <a href="#" onclick="closeRegister()">Fazer login</a>
      </p>
      <div class="login-error" id="registerError"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithPopup,
      GoogleAuthProvider,
      FacebookAuthProvider,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // =============================================
    // 🔧 SUBSTITUA PELAS SUAS CREDENCIAIS FIREBASE
    // Acesse: https://console.firebase.google.com
    // =============================================
    const firebaseConfig = {
      apiKey: "AIzaSyA3S815yG3gK_yn_DLfink5gZ52AsnVzkg",
      authDomain: "morais-store-3a6dd.firebaseapp.com",
      projectId: "morais-store-3a6dd",
      storageBucket: "morais-store-3a6dd.firebasestorage.app",
      messagingSenderId: "15584815749",
      appId: "1:15584815749:web:ce1222959c7e5d5232f1e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    const facebookProvider = new FacebookAuthProvider();

    // Verifica se já está logado → redireciona para o site
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    function showError(elementId, msg) {
      const el = document.getElementById(elementId);
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function translateError(code) {
      const errors = {
        'auth/user-not-found': 'Usuário não encontrado.',
        'auth/wrong-password': 'Senha incorreta.',
        'auth/invalid-email': 'E-mail inválido.',
        'auth/email-already-in-use': 'Este e-mail já está cadastrado.',
        'auth/weak-password': 'Senha muito fraca. Use pelo menos 6 caracteres.',
        'auth/popup-closed-by-user': 'Login cancelado.',
        'auth/account-exists-with-different-credential': 'Já existe uma conta com este e-mail usando outro método.',
        'auth/invalid-credential': 'Credenciais inválidas. Verifique e-mail e senha.',
      };
      return errors[code] || 'Erro ao fazer login. Tente novamente.';
    }

    // Login Google
    document.getElementById('btnGoogle').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (e) {
        showError('loginError', translateError(e.code));
      }
    });

    // Login Facebook
    document.getElementById('btnFacebook').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, facebookProvider);
      } catch (e) {
        showError('loginError', translateError(e.code));
      }
    });

    // Login Email/Senha
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        showError('loginError', translateError(err.code));
      }
    });

    // Cadastro Google
    document.getElementById('btnGoogleRegister').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (e) {
        showError('registerError', translateError(e.code));
      }
    });

    // Cadastro Facebook
    document.getElementById('btnFacebookRegister').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, facebookProvider);
      } catch (e) {
        showError('registerError', translateError(e.code));
      }
    });

    // Cadastro Email/Senha
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('nameInput').value;
      const email = document.getElementById('regEmailInput').value;
      const password = document.getElementById('regPasswordInput').value;
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });
      } catch (err) {
        showError('registerError', translateError(err.code));
      }
    });

    // Expõe funções para o HTML
    window.togglePassword = function() {
      const input = document.getElementById('passwordInput');
      input.type = input.type === 'password' ? 'text' : 'password';
    };

    window.closeRegister = function() {
      document.getElementById('registerModal').classList.remove('active');
    };

    document.getElementById('showRegister').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('registerModal').classList.add('active');
    });
  </script>
</body>
</html>
